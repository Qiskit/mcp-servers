name: Publish to MCP Registry

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish to MCP Registry'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - qiskit
          - code-assistant
          - runtime
          - transpiler
          - gym

jobs:
  publish-qiskit-mcp-registry:
    if: |
      (github.event_name == 'release' && contains(github.ref, 'qiskit-v')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'all' || github.event.inputs.package == 'qiskit'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for GitHub OIDC authentication
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Wait for PyPI availability
      working-directory: ./qiskit-mcp-server
      run: |
        PACKAGE=$(python3 -c "import json; print(json.load(open('server.json'))['packages'][0]['identifier'])")
        VERSION=$(python3 -c "import json; print(json.load(open('server.json'))['packages'][0]['version'])")
        echo "Waiting for $PACKAGE==$VERSION on PyPI..."
        for i in $(seq 1 30); do
          if curl -sf "https://pypi.org/pypi/$PACKAGE/$VERSION/json" > /dev/null 2>&1; then
            echo "✓ $PACKAGE==$VERSION is available on PyPI (attempt $i)"
            exit 0
          fi
          echo "Attempt $i/30: not yet available, waiting 20s..."
          sleep 20
        done
        echo "✗ Timed out waiting for $PACKAGE==$VERSION on PyPI after 10 minutes"
        exit 1

    - name: Download mcp-publisher
      run: |
        curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
        sudo mv mcp-publisher /usr/local/bin/
        mcp-publisher --help

    - name: Login to MCP Registry (OIDC)
      run: mcp-publisher login github-oidc

    - name: Publish to MCP Registry
      working-directory: ./qiskit-mcp-server
      run: mcp-publisher publish

